<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TUCA | Character Design</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="character-design.css">
  <script src="character-design.js" defer></script>
</head>
<body>
  <main class="char-page">
    <section class="char-stage">
      <header class="char-header">
        <a class="brand-link" href="index.html" aria-label="Voltar para a home">
          <div class="brand-row">
            <h1 class="brand-title">TUCA</h1>

            <img
              class="brand-illustration"
              src="assets/images/tuca_img2.png"
              alt="Ilustração do artista"
            >
          </div>

          <span class="brand-line" aria-hidden="true"></span>
        </a>

        <h2 class="page-title">*CHARACTER DESIGN*</h2>
      </header>

      <section class="carousel-section">
        <div class="carousel-viewport" id="carouselViewport">
          <div class="carousel-track" id="carouselTrack"></div>
        </div>
      </section>

      <section class="description-section">
        <p class="character-description" id="characterDescription">
          *Descrição do personagem.
        </p>
      </section>

      <footer class="char-footer">
        <p>*desantanatuca@gmail.com</p>
        <p>*@TUCA STUDIO</p>
      </footer>

      <img
        class="corner-star corner-star-left"
        src="assets/images/star-purple.png"
        alt=""
        aria-hidden="true"
      >

      <img
        class="corner-star corner-star-right"
        src="assets/images/star-purple.png"
        alt=""
        aria-hidden="true"
      >
    </section>
  </main>
</body>
</html>
